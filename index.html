<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tommaso Salza | Retro Profile</title>
    <style>
      :root {
        --bg: #0a0a08;
        --panel: #17140f;
        --text: #f7ebc0;
        --muted: #c6b489;
        --accent: #ffd54f;
        --accent-2: #7bdff2;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Courier New", Courier, monospace;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255,213,79,0.16), transparent 28%),
          linear-gradient(135deg, #060605 0%, #13110d 48%, #1c1914 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          repeating-linear-gradient(180deg, rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 4px),
          radial-gradient(circle, rgba(255,255,255,0.12) 0 1px, transparent 1px);
        background-size: auto, 3px 3px;
        mix-blend-mode: screen;
        opacity: 0.8;
        animation: scanline 3.8s linear infinite, noise 0.12s steps(2, end) infinite;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.8) 100%);
        pointer-events: none;
        mix-blend-mode: multiply;
        animation: vignette 5s ease-in-out infinite alternate;
      }

      .tv-frame {
        width: min(920px, 100%);
        padding: 18px;
        border-radius: 34px;
        background: linear-gradient(145deg, #2b241f, #140f0c);
        box-shadow:
          inset 0 0 0 2px rgba(255,213,79,0.25),
          inset 0 0 40px rgba(0,0,0,0.65),
          0 0 45px rgba(255,213,79,0.16);
        animation: frameGlow 4s ease-in-out infinite alternate;
        position: relative;
        overflow: hidden;
      }

      .tv-frame::before {
        content: "";
        position: absolute;
        inset: -8px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.04), transparent 20%, transparent 80%, rgba(0,0,0,0.22)),
          radial-gradient(circle at 20% 20%, rgba(255,255,255,0.06), transparent 35%);
        mix-blend-mode: screen;
        pointer-events: none;
        animation: frameDistort 3.2s ease-in-out infinite alternate;
        filter: blur(1.2px);
      }

      .tv-frame::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent 20%, transparent 80%, rgba(255,255,255,0.025));
        pointer-events: none;
        mix-blend-mode: screen;
        opacity: 0.7;
      }

      .screen {
        position: relative;
        border-radius: 24px;
        overflow: hidden;
        background: linear-gradient(145deg, rgba(20,16,11,0.96), rgba(8,8,6,0.98));
        border: 3px solid rgba(255,213,79,0.45);
        box-shadow: inset 0 0 35px rgba(0,0,0,0.8), inset 0 0 24px rgba(255,213,79,0.18);
        filter: contrast(1.16) brightness(0.93) saturate(0.9);
        animation: screenFlicker 4.2s linear infinite;
      }

      .screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(180deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px, transparent 1px, transparent 6px);
        mix-blend-mode: screen;
        opacity: 0.85;
        pointer-events: none;
        animation: scanline 2.6s linear infinite;
      }

      .screen::after {
        content: "";
        position: absolute;
        inset: -6px;
        background:
          linear-gradient(180deg, rgba(255,221,111,0.16), transparent 20%, transparent 80%, rgba(0,0,0,0.42)),
          linear-gradient(90deg, rgba(255,255,255,0.06), transparent 18%, transparent 82%, rgba(255,255,255,0.035));
        pointer-events: none;
        animation: crtGlow 2.2s ease-in-out infinite alternate, wobble 2.8s ease-in-out infinite;
        transform: skewX(-0.8deg);
        filter: blur(1px);
      }

      .boot-screen {
        position: absolute;
        inset: 0;
        z-index: 10;
        padding: 32px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        background: rgba(5, 5, 3, 0.97);
        color: var(--text);
        transition: opacity 0.7s ease, transform 0.7s ease;
      }

      .boot-screen.is-hidden {
        opacity: 0;
        transform: scale(1.02);
        pointer-events: none;
      }

      .boot-title {
        font-size: 0.95rem;
        color: var(--accent);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .typing-line {
        min-height: 2rem;
        font-size: 1.1rem;
        letter-spacing: 0.08em;
      }

      .cursor {
        display: inline-block;
        width: 0.7ch;
        height: 1.1em;
        margin-left: 2px;
        background: var(--accent);
        vertical-align: text-bottom;
        animation: blink 0.75s steps(1, end) infinite;
      }

      .hero-line {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        min-height: 3rem;
        position: relative;
      }

      .prompt {
        color: var(--accent);
        margin-right: 8px;
        font-weight: 700;
      }

      .site-cursor {
        display: inline-block;
        width: 0.7ch;
        height: 1.1em;
        margin-left: 2px;
        background: var(--accent);
        vertical-align: text-bottom;
        animation: blink 0.75s steps(1, end) infinite;
        opacity: 0;
      }

      .site-cursor.is-visible {
        opacity: 1;
      }

      .boot-text {
        color: var(--muted);
        line-height: 1.7;
        max-width: 560px;
      }

      .card {
        width: 100%;
        min-height: 520px;
        background: rgba(5, 5, 3, 0.96);
        border-radius: 18px;
        overflow: hidden;
        position: relative;
        opacity: 0;
        transform: translateY(8px) scale(0.99);
        transition: opacity 0.8s ease, transform 0.8s ease;
        border: 1px solid rgba(255,213,79,0.16);
        box-shadow: inset 0 0 22px rgba(255,213,79,0.05);
        animation: terminalPulse 6s ease-in-out infinite;
        filter: drop-shadow(0 0 8px rgba(255,213,79,0.1));
      }

      .card.is-visible {
        opacity: 1;
        transform: none;
      }

      .hero {
        padding: 36px 36px 24px;
        border-bottom: 1px solid rgba(255,213,79,0.2);
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        color: var(--accent);
        font-size: 0.8rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 3.4vw, 2.5rem);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text);
      }

      .subtitle {
        margin: 0;
        font-size: 1rem;
        color: var(--muted);
        line-height: 1.7;
        max-width: 680px;
        position: relative;
      }

      .content {
        padding: 24px 36px 36px;
        display: grid;
        gap: 18px;
      }

      .section {
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid rgba(255,213,79,0.12);
        border-radius: 10px;
        padding: 16px 18px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }

      .section.is-visible {
        opacity: 1;
        transform: none;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 0.95rem;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .tags span {
        padding: 8px 10px;
        border: 1px solid rgba(255,213,79,0.16);
        border-radius: 4px;
        background: rgba(255,213,79,0.06);
        color: var(--text);
        font-size: 0.92rem;
        animation: tagPop 0.45s ease-out both;
      }

      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      @keyframes scanline {
        from { transform: translateY(-2%); }
        to { transform: translateY(2%); }
      }

      @keyframes noise {
        0% { opacity: 0.45; }
        100% { opacity: 0.58; }
      }

      @keyframes crtGlow {
        0% {
          box-shadow: inset 0 0 0 transparent;
          background:
            linear-gradient(180deg, rgba(255,255,255,0.05), transparent 20%, transparent 80%, rgba(0,0,0,0.18)),
            linear-gradient(90deg, rgba(255,255,255,0.04), transparent 20%, transparent 80%, rgba(255,255,255,0.025));
        }
        100% {
          box-shadow: inset 0 0 40px rgba(255, 196, 0, 0.26);
          background:
            linear-gradient(180deg, rgba(255, 220, 110, 0.12), transparent 18%, transparent 82%, rgba(255, 196, 0, 0.16)),
            linear-gradient(90deg, rgba(255,255,255,0.06), transparent 20%, transparent 80%, rgba(255,255,255,0.035));
        }
      }

      @keyframes screenFlicker {
        0%, 100% { transform: scale(1) translateY(0); }
        1% { transform: scale(1.004) translateY(1px); }
        2% { transform: scale(1) translateY(0); }
        3% { transform: scale(1.002) translateY(-1px); }
        4% { transform: scale(1) translateY(0); }
        55% { transform: scale(1) translateY(0); }
        56% { transform: scale(1.006, 0.996) translateY(1px); }
        57% { transform: scale(1) translateY(0); }
      }

      @keyframes wobble {
        0%, 100% { transform: translateX(0) skewX(-0.8deg); }
        25% { transform: translateX(-1px) skewX(-0.9deg); }
        50% { transform: translateX(1px) skewX(-0.7deg); }
        75% { transform: translateX(-0.5px) skewX(-0.8deg); }
      }

      @keyframes frameGlow {
        0% { box-shadow: inset 0 0 0 2px rgba(255,213,79,0.22), inset 0 0 40px rgba(0,0,0,0.65), 0 0 45px rgba(255,213,79,0.14); }
        100% { box-shadow: inset 0 0 0 2px rgba(255,213,79,0.32), inset 0 0 50px rgba(0,0,0,0.72), 0 0 60px rgba(255,213,79,0.2); }
      }

      @keyframes frameDistort {
        0% { transform: translateX(0) scale(1); opacity: 0.45; }
        50% { transform: translateX(-1px) scale(1.01); opacity: 0.7; }
        100% { transform: translateX(1px) scale(1.015); opacity: 0.55; }
      }

      @keyframes vignette {
        0% { opacity: 0.75; }
        100% { opacity: 0.95; }
      }

      @keyframes terminalPulse {
        0%, 100% { box-shadow: inset 0 0 22px rgba(255,213,79,0.05); }
        50% { box-shadow: inset 0 0 30px rgba(255,213,79,0.11); }
      }

      @keyframes tagPop {
        0% { transform: translateY(4px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      @media (max-width: 600px) {
        .hero, .content { padding-left: 20px; padding-right: 20px; }
        .boot-screen { padding: 20px; }
      }
    </style>
  </head>
  <body>
    <div class="tv-frame">
      <div class="screen">
        <div class="boot-screen" id="bootScreen">
          <div class="boot-title">Initializing profile...</div>
          <div class="typing-line">
            <span id="typedName"></span><span class="cursor"></span>
          </div>
          <div class="boot-text">
            Establishing connection to the retro terminal. Please wait while the profile is loaded.
          </div>
        </div>

        <main class="card" id="profileCard">
          <section class="hero">
            <div class="eyebrow">Retro profile</div>
            <div class="hero-line">
              <span class="prompt">&gt;</span>
              <h1 id="mainName"></h1>
              <span class="site-cursor" id="heroCursor"></span>
            </div>
            <p class="subtitle" id="subtitleText"></p>
          </section>

          <section class="content">
            <article class="section" id="aboutSection">
              <h2 id="aboutHeading"></h2>
              <p id="aboutText"></p>
            </article>

            <article class="section" id="interestsSection">
              <h2 id="interestsHeading"></h2>
              <div class="tags" id="tags"></div>
            </article>
          </section>
        </main>
      </div>
    </div>

    <script>
      const nameToType = "Tommaso Salza";
      const subtitleTextValue = "I am a student with a passion for technology, cloud systems, and digital innovation. I enjoy learning new skills and building strong foundations for the future.";
      const aboutTextValue = "My name is Tommaso Salza. I study at ITS ICT in Turin, Piedmont, and I am training to become an AWS Cloud Architect.";
      const interestsTags = ["Cloud Computing", "AWS", "Networking", "Cybersecurity", "Innovation", "Technology"];

      const typedName = document.getElementById("typedName");
      const bootScreen = document.getElementById("bootScreen");
      const profileCard = document.getElementById("profileCard");
      const heroCursor = document.getElementById("heroCursor");
      const mainName = document.getElementById("mainName");
      const subtitleTextElement = document.getElementById("subtitleText");
      const aboutSection = document.getElementById("aboutSection");
      const aboutHeading = document.getElementById("aboutHeading");
      const aboutText = document.getElementById("aboutText");
      const interestsSection = document.getElementById("interestsSection");
      const interestsHeading = document.getElementById("interestsHeading");
      const tags = document.getElementById("tags");

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      async function typeBootName(index = 0) {
        if (index <= nameToType.length) {
          typedName.textContent = nameToType.slice(0, index);
          await wait(90);
          await typeBootName(index + 1);
          return;
        }

        await wait(650);
        bootScreen.classList.add("is-hidden");
        profileCard.classList.add("is-visible");
        heroCursor.classList.add("is-visible");
        await revealSiteContent();
      }

      async function typeInto(element, text, speed = 35) {
        element.textContent = "";
        for (let i = 0; i <= text.length; i += 1) {
          element.textContent = text.slice(0, i);
          await wait(speed);
        }
      }

      async function typeTags(container, values, speed = 34) {
        container.innerHTML = "";
        for (const value of values) {
          const span = document.createElement("span");
          span.textContent = "";
          container.appendChild(span);
          for (let i = 0; i <= value.length; i += 1) {
            span.textContent = value.slice(0, i);
            await wait(speed);
          }
          await wait(70);
        }
      }

      async function revealSiteContent() {
        await typeInto(mainName, nameToType, 70);
        await wait(140);
        await typeInto(subtitleTextElement, subtitleTextValue, 22);
        await wait(140);
        aboutSection.classList.add("is-visible");
        await typeInto(aboutHeading, "About me", 40);
        await typeInto(aboutText, aboutTextValue, 19);
        await wait(140);
        interestsSection.classList.add("is-visible");
        await typeInto(interestsHeading, "Interests", 40);
        await typeTags(tags, interestsTags, 28);
        heroCursor.classList.remove("is-visible");
      }

      window.addEventListener("load", () => {
        setTimeout(() => {
          typeBootName();
        }, 350);
      });
    </script>
  </body>
</html>
